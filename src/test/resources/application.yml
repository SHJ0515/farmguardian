spring:
  datasource:
    url: jdbc:h2:mem:farmguardian-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

jwt:
  secret: VGVzdEp3dFNlY3JldEtleUZvckZhcm1HdWFyZGlhblRlc3RTdWl0ZTAwMDAwMDAw
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

firebase:
  enabled: false

fastapi:
  base-url: http://localhost
  timeout:
    connect: 5
    read: 10

mqtt:
  broker-url: tcp://localhost:1883
  client-id: farmguardian-server-test
  username: test-user
  password: test-password
  qos: 1
  connection-timeout: 1
  keep-alive-interval: 10
  automatic-reconnect: false
