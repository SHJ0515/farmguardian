# Synthetic test-only values. Do not reuse these credentials outside automated tests.
spring:
  datasource:
    url: jdbc:h2:mem:farmguardian-local-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
