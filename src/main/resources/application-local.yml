spring:
  config:
    import: optional:file:./config/application-local-secret.yml
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/farmguardian}
    username: ${DB_USERNAME:farmguardian}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}

jwt:
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:1800000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

fastapi:
  base-url: ${FASTAPI_BASE_URL:http://localhost:8000}
  timeout:
    connect: ${FASTAPI_CONNECT_TIMEOUT:5}
    read: ${FASTAPI_READ_TIMEOUT:10}

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:farmguardian-server-local}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  qos: ${MQTT_QOS:1}
  connection-timeout: ${MQTT_CONNECTION_TIMEOUT:30}
  keep-alive-interval: ${MQTT_KEEP_ALIVE_INTERVAL:60}
  automatic-reconnect: ${MQTT_AUTOMATIC_RECONNECT:true}

server:
  port: ${SERVER_PORT:8080}

decorator:
  datasource:
    p6spy:
      log-format-strategy: multiline

logging:
  level:
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:INFO}
